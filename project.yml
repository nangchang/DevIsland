name: DevIsland
options:
  bundleIdPrefix: kr.or.nes
  xcodeVersion: "15.0"
  objectVersion: 56
targets:
  DevIsland:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: DevIsland
      - path: scripts/devisland-bridge.sh
        group: Resources
        type: resource
      - path: scripts/install-bridge.sh
        group: Resources
        type: resource
      - path: scripts/install-launch-agent.sh
        group: Resources
        type: resource
    info:
      path: DevIsland/Info.plist
      properties:
        CFBundleShortVersionString: 0.2.2
        CFBundleVersion: 7
        LSUIElement: true
        NSHighResolutionCapable: true
        NSAppleEventsUsageDescription: "Approve/Deny 후 터미널 앱을 포커스하기 위해 사용합니다."
        NSAccessibilityUsageDescription: "글로벌 단축키(⌘⇧Y/N) 사용을 위해 접근성 권한이 필요합니다."
