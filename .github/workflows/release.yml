name: Release

on:
  workflow_run:
    workflows: ["Version Bump"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild archive \
            -project DevIsland.xcodeproj \
            -scheme DevIsland \
            -configuration Release \
            -archivePath build/DevIsland.xcarchive \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

      - name: Export App
        run: |
          mkdir -p build/Export
          cp -R build/DevIsland.xcarchive/Products/Applications/DevIsland.app build/Export/

      - name: Create DMG
        run: |
          ln -s /Applications build/Export/Applications
          hdiutil create -volname "DevIsland" -srcfolder build/Export -ov -format UDZO DevIsland.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: DevIsland.dmg
          tag_name: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          name: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
