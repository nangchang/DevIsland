name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild archive \
            -project DevIsland.xcodeproj \
            -scheme DevIsland \
            -configuration Release \
            -archivePath build/DevIsland.xcarchive \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

      - name: Export App
        run: |
          mkdir -p build/Export
          cp -R build/DevIsland.xcarchive/Products/Applications/DevIsland.app build/Export/

      - name: Create DMG
        run: |
          ln -s /Applications build/Export/Applications
          hdiutil create -volname "DevIsland" -srcfolder build/Export -ov -format UDZO DevIsland.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: DevIsland.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
