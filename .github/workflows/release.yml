name: Release

on:
  workflow_run:
    workflows: ["Version Bump"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: ${{ runner.os }}-brew-

      - name: Build and Create DMG
        run: ./scripts/create-dmg.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: DevIsland.dmg
          tag_name: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          name: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
