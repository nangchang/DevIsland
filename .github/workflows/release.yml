name: Release

on:
  workflow_run:
    workflows: ["Version Bump"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (build DMG only, do not create release)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: ${{ runner.os }}-brew-

      - name: Cache Homebrew Tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            /opt/homebrew/bin/xcodegen
            /opt/homebrew/bin/create-dmg
            /opt/homebrew/Cellar/xcodegen
            /opt/homebrew/Cellar/create-dmg
          key: ${{ runner.os }}-brew-tools-${{ hashFiles('.github/workflows/release.yml') }}

      - name: Install dependencies
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          brew install xcodegen create-dmg

      - name: Build and Create DMG
        run: ./scripts/create-dmg.sh

      - name: Create Release
        if: github.event.inputs.dry-run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: DevIsland.dmg
          tag_name: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          name: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
