name: Version Bump

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  bump:
    name: Bump version files to match tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          persist-credentials: true
          fetch-depth: 0

      - name: Bump project.yml
        id: bump
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT_VERSION=$(grep "CFBundleShortVersionString:" project.yml | sed -E 's/.*: "(.*)"/\1/')
          
          if [ "$CURRENT_VERSION" == "$VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version already matches tag ($VERSION) — skipping bump to prevent loop."
          else
            # Only update if the marketing version is different
            sed -i "s/CFBundleShortVersionString: .*/CFBundleShortVersionString: \"$VERSION\"/" project.yml
            sed -i "s/CFBundleVersion: .*/CFBundleVersion: \"${{ github.run_number }}\"/" project.yml
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Commit, push, and retag at bump commit
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add project.yml
          git commit -m "chore: bump version to ${GITHUB_REF_NAME#v} (build ${{ github.run_number }}) [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
          
          # Move the tag to the new commit
          git tag -f "$GITHUB_REF_NAME"
          git push origin -f "refs/tags/$GITHUB_REF_NAME"

      - name: Trigger Release Workflow
        if: steps.bump.outputs.changed == 'true'
        run: |
          echo "Triggering Release workflow for tag $GITHUB_REF_NAME..."
          gh workflow run release.yml --ref "$GITHUB_REF_NAME" -f tag_name="$GITHUB_REF_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
